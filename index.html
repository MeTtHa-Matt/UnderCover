<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>Undercover</title>
    <meta name="theme-color" content="#0b0f1e" />
    <meta name="application-name" content="Undercover" />
    <meta
      name="description"
      content="Le jeu du mot secret — un seul téléphone, plusieurs joueurs, 100% hors ligne."
    />

    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="icon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Undercover" />

    <link href="style.css" rel="stylesheet" />
  </head>

  <body>
    <div class="wrap">
      <h1>🕵️ <span>UNDERCOVER</span></h1>

      <div id="app"></div>
    </div>

    <script src="words_list.js"></script>
    <script src="script.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").catch((error) => {
            console.error("Service worker registration failed:", error);
          });
        });
      }
    </script>
  </body>
</html>
